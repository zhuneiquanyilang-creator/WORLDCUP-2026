name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fetch live scores ワークフロー (GitHub Actions による自動 push) は
  # GITHUB_TOKEN 制約で deploy.yml の on:push を発火できないため、
  # 完了イベントを workflow_run で受けて自動デプロイにつなぐ。
  workflow_run:
    workflows: ["Fetch live scores"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # true にすると新しい push が来た時点で古い deploy をキャンセルする。
  # false にすると queue で待つが、古い deploy が新しい deploy の後に実行されて
  # 公開サイトを古い内容で上書きしてしまうケースが発生する
  # (例: 20:58 push A → build 待機、20:59 push B → build 完了 → deploy B 完了、
  #      その後 A の deploy が完了して B の内容を A の古い内容で上書き)。
  # cancel エラー表示は出るが、確実に最新の sha が公開サイトに残るためには true 必須。
  cancel-in-progress: true

jobs:
  # workflow_run で発火した場合、fetch-scores が実際に commit していないなら
  # deploy 不要なので、ここで sha を比較して skip 判定する。
  # push / workflow_dispatch 起因の場合は無条件で deploy する。
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            START="${{ github.event.workflow_run.head_sha }}"
            CURRENT=$(git rev-parse HEAD)
            if [ "$START" = "$CURRENT" ]; then
              echo "should_deploy=false" >> $GITHUB_OUTPUT
              echo "::notice::Fetch live scores made no commit (HEAD unchanged); skipping deploy"
            else
              echo "should_deploy=true" >> $GITHUB_OUTPUT
              echo "Fetch live scores advanced HEAD from $START to $CURRENT"
            fi
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # GitHub Pages のサブパス (/<repo>/) を base に設定してビルド
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
