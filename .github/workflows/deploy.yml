name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fetch live scores ワークフロー (GitHub Actions による自動 push) は
  # GITHUB_TOKEN 制約で deploy.yml の on:push を発火できないため、
  # 完了イベントを workflow_run で受けて自動デプロイにつなぐ。
  workflow_run:
    workflows: ["Fetch live scores"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # false にすると新しい deploy が来ても古いのを cancel せず順番に待つ。
  # true だと auto-push が短時間に複数走った時に "Canceling since a higher
  # priority waiting request for pages exists" で古い deploy が全部失敗する。
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # GitHub Pages のサブパス (/<repo>/) を base に設定してビルド
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
