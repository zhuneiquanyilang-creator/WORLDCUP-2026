name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fetch live scores ワークフロー (GitHub Actions による自動 push) は
  # GITHUB_TOKEN 制約で deploy.yml の on:push を発火できないため、
  # 完了イベントを workflow_run で受けて自動デプロイにつなぐ。
  workflow_run:
    workflows: ["Fetch live scores"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # true にすると新しい push が来た時点で古い deploy をキャンセルする。
  # false にすると queue で待つが、古い deploy が新しい deploy の後に実行されて
  # 公開サイトを古い内容で上書きしてしまうケースが発生する
  # (例: 20:58 push A → build 待機、20:59 push B → build 完了 → deploy B 完了、
  #      その後 A の deploy が完了して B の内容を A の古い内容で上書き)。
  # cancel エラー表示は出るが、確実に最新の sha が公開サイトに残るためには true 必須。
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # GitHub Pages のサブパス (/<repo>/) を base に設定してビルド
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
